name: Queen’s Regalia CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test tool
      - run: flutter analyze
      - run: flutter test --exclude-tags=golden
      # Flutter's unit-test asset bundle is cached without the asset flavor in
      # its fingerprint. Reset it before asserting the paid-only package.
      - run: flutter clean
      - run: flutter pub get
      - run: flutter test --flavor paid test/atlas_of_borrowed_winds_paid_bundle_test.dart
      - run: dart run tool/generate_puzzles.dart validate
      - run: dart run tool/generate_puzzles.dart validate --catalog assets/content/arcs/atlas-of-borrowed-winds/catalog.json
      - run: dart run tool/verify_crown_art.dart
      - run: dart run tool/verify_offline.dart

  goldens:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          cache: true
      - run: flutter pub get
      - run: flutter test --tags=golden

  build:
    needs:
      - verify
      - goldens
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: web
            command: flutter build web --release
            artifact: build/web
          - os: ubuntu-latest
            target: linux
            command: flutter build linux --release
            artifact: build/linux/x64/release/bundle
          - os: ubuntu-latest
            target: android-apk
            command: flutter build apk --release
            artifact: build/app/outputs/flutter-apk/app-release.apk
          - os: ubuntu-latest
            target: android-aab
            command: flutter build appbundle --release
            artifact: build/app/outputs/bundle/release/app-release.aab
          - os: windows-2022
            target: windows
            command: flutter build windows --release
            artifact: build/windows/x64/runner/Release
          - os: macos-latest
            target: macos
            command: flutter build macos --release
            artifact: build/macos/Build/Products/Release
          - os: macos-latest
            target: ios
            command: flutter build ios --release --no-codesign
            artifact: build/ios/iphoneos/Runner.app
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          cache: true
      - run: flutter pub get
      - if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - if: matrix.target != 'web'
        run: dart run tool/stage_paid_edition.dart --output "${{ runner.temp }}/regalia-paid"
      - if: matrix.target != 'web'
        working-directory: ${{ runner.temp }}/regalia-paid
        run: flutter pub get
      - if: matrix.target != 'web'
        working-directory: ${{ runner.temp }}/regalia-paid
        run: dart run tool/verify_offline.dart --paid-source
      - if: matrix.target == 'web'
        run: ${{ matrix.command }}
      - if: matrix.target != 'web'
        working-directory: ${{ runner.temp }}/regalia-paid
        run: ${{ matrix.command }}
      - if: matrix.target != 'web'
        working-directory: ${{ runner.temp }}/regalia-paid
        run: dart run tool/verify_offline.dart --paid-source --native-build "${{ matrix.artifact }}"
      - if: matrix.target == 'web'
        run: dart run tool/verify_offline.dart --web-build build/web
      - if: matrix.target == 'web'
        uses: actions/upload-artifact@v4
        with:
          name: regalia-${{ matrix.target }}
          path: ${{ matrix.artifact }}
      - if: matrix.target != 'web'
        uses: actions/upload-artifact@v4
        with:
          name: regalia-${{ matrix.target }}
          path: ${{ runner.temp }}/regalia-paid/${{ matrix.artifact }}
