name: Queen’s Regalia CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test tool
      - run: flutter analyze
      - run: flutter test --exclude-tags=golden
      - run: dart run tool/generate_puzzles.dart validate
      - run: dart run tool/verify_offline.dart

  goldens:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          cache: true
      - run: flutter pub get
      - run: flutter test --tags=golden

  build:
    needs:
      - verify
      - goldens
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: web
            command: flutter build web --release
            artifact: build/web
          - os: ubuntu-latest
            target: linux
            command: flutter build linux --release
            artifact: build/linux/x64/release/bundle
          - os: ubuntu-latest
            target: android-apk
            command: flutter build apk --release
            artifact: build/app/outputs/flutter-apk/app-release.apk
          - os: ubuntu-latest
            target: android-aab
            command: flutter build appbundle --release
            artifact: build/app/outputs/bundle/release/app-release.aab
          - os: windows-latest
            target: windows
            command: flutter build windows --release
            artifact: build/windows/x64/runner/Release
          - os: macos-latest
            target: macos
            command: flutter build macos --release
            artifact: build/macos/Build/Products/Release
          - os: macos-latest
            target: ios
            command: flutter build ios --release --no-codesign
            artifact: build/ios/iphoneos/Runner.app
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          cache: true
      - run: flutter pub get
      - if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: ${{ matrix.command }}
      - if: matrix.target == 'web'
        run: dart run tool/verify_offline.dart --web-build build/web
      - uses: actions/upload-artifact@v4
        with:
          name: regalia-${{ matrix.target }}
          path: ${{ matrix.artifact }}
