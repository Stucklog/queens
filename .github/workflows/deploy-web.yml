name: Deploy Queen’s Regalia to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --exclude-tags=golden

      - name: Test golden layouts
        run: flutter test --tags=golden

      - name: Test web release channel
        run: flutter test --platform chrome test/current_release_channel_test.dart

      - name: Validate every puzzle catalog
        run: dart run tool/generate_puzzles.dart validate-all

      - name: Verify crown art
        run: dart run tool/verify_crown_art.dart

      - name: Stage GitHub Pages edition
        run: dart run tool/stage_web_edition.dart --output "${{ runner.temp }}/regalia-web"

      - name: Install staged web dependencies
        working-directory: ${{ runner.temp }}/regalia-web
        run: flutter pub get

      - name: Verify staged web source
        working-directory: ${{ runner.temp }}/regalia-web
        run: dart run tool/verify_offline.dart --web-source

      - name: Build release PWA
        working-directory: ${{ runner.temp }}/regalia-web
        run: flutter build web --release --base-href "/"

      - name: Verify offline release
        working-directory: ${{ runner.temp }}/regalia-web
        run: dart run tool/verify_offline.dart --web-source --web-build build/web

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/regalia-web/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
