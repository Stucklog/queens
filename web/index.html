<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Queen’s Regalia is a private, offline journey of handcrafted Queens logic puzzles.">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#151D3B">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Queen’s Regalia">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Queen’s Regalia</title>
  <link rel="manifest" href="manifest.json">
  <style>
    @font-face {
      font-family: "Regalia Pixel";
      src: url("assets/assets/fonts/PixelifySans-Variable.ttf") format("truetype");
      font-weight: 400 700;
      font-display: swap;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #151D3B;
      color-scheme: only dark;
    }

    #regalia-loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-content: center;
      gap: 16px;
      color: #FFF3DC;
      font-family: "Regalia Pixel", monospace;
      font-size: 18px;
      letter-spacing: 1px;
      text-align: center;
    }

    #regalia-loader img {
      width: 96px;
      height: 96px;
      margin: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #regalia-loader span {
      border: 2px solid #D6AF53;
      box-shadow: 4px 4px 0 #080D20;
      padding: 8px 12px;
    }
  </style>
</head>
<body>
  <div id="regalia-loader" role="status" aria-label="Opening Queen’s Regalia">
    <img src="icons/Icon-192.png" alt="" />
    <span>OPENING REGALIA…</span>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('regalia-loader')?.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
