name: regalia
description: "An original, offline Queens puzzle journey."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.7.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  image: ^4.8.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # Flutter's own route and platform fallbacks still reference these glyphs.
  # App-owned icons use the custom PixelGlyph system in lib/widgets/pixel_ui.dart.
  uses-material-design: true
  assets:
    - assets/academy/
    - assets/art/
    - assets/art/backgrounds/
    - assets/art/combat/
    - assets/art/combat/opponents/
    - assets/content/
    - assets/content/arcs/origin/
    - assets/storefront/sun-sail-covenant/
    - assets/content/arcs/sun-sail-covenant/
    - assets/art/arcs/sun-sail-covenant/backgrounds/
    - assets/art/arcs/sun-sail-covenant/combat/opponents/
    - assets/storefront/where-the-rain-trees-walk/
    - assets/content/arcs/where-the-rain-trees-walk/
    - assets/art/arcs/where-the-rain-trees-walk/backgrounds/
    - assets/art/arcs/where-the-rain-trees-walk/combat/opponents/
    - assets/storefront/oathstorm-fleet/
    - assets/content/arcs/oathstorm-fleet/
    - assets/art/arcs/oathstorm-fleet/backgrounds/
    - assets/art/arcs/oathstorm-fleet/combat/opponents/
    - assets/storefront/crimson-ledger/
    - assets/content/arcs/crimson-ledger/
    - assets/art/arcs/crimson-ledger/backgrounds/
    - assets/art/arcs/crimson-ledger/combat/opponents/
    - assets/storefront/atlas-of-borrowed-winds/
    - assets/content/arcs/atlas-of-borrowed-winds/
    - assets/art/arcs/atlas-of-borrowed-winds/backgrounds/
    - assets/art/arcs/atlas-of-borrowed-winds/characters/
    - assets/art/arcs/atlas-of-borrowed-winds/combat/opponents/
    - assets/storefront/treaty-written-in-thorns/
    - assets/content/arcs/treaty-written-in-thorns/
    - assets/art/arcs/treaty-written-in-thorns/backgrounds/
    - assets/art/arcs/treaty-written-in-thorns/combat/opponents/
    - assets/storefront/inn-at-the-end-of-yesterday/
    - assets/content/arcs/inn-at-the-end-of-yesterday/
    - assets/art/arcs/inn-at-the-end-of-yesterday/backgrounds/
    - assets/art/arcs/inn-at-the-end-of-yesterday/combat/opponents/
    - assets/storefront/ninth-library/
    - assets/content/arcs/ninth-library/
    - assets/art/arcs/ninth-library/backgrounds/
    - assets/art/arcs/ninth-library/combat/opponents/
    - assets/storefront/shepherds-of-the-thunderwild/
    - assets/content/arcs/shepherds-of-the-thunderwild/
    - assets/art/arcs/shepherds-of-the-thunderwild/backgrounds/
    - assets/art/arcs/shepherds-of-the-thunderwild/combat/opponents/
    - assets/storefront/steal-the-seventh-tide/
    - assets/content/arcs/steal-the-seventh-tide/
    - assets/art/arcs/steal-the-seventh-tide/backgrounds/
    - assets/art/arcs/steal-the-seventh-tide/combat/opponents/
    - assets/fonts/PixelifySans_LICENSE.txt
    - assets/puzzles/catalog.json
    - assets/puzzles/tutorial.json
  fonts:
    - family: RegaliaPixel
      fonts:
        - asset: assets/fonts/PixelifySans-Variable.ttf

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
